name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "Host ssh.israeldeveloper.com.br
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - run: gem install kamal -v "~> 2.0"

      # Garante que o accessory Postgres está rodando antes do deploy.
      # Idempotente: se já está de pé, é no-op.
      - name: Boot Postgres accessory
        run: kamal accessory boot postgres
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_HOST: ssh.israeldeveloper.com.br
          KAMAL_SSH_USER: ${{ secrets.KAMAL_SSH_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Deploy with Kamal
        run: kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_HOST: ssh.israeldeveloper.com.br
          KAMAL_SSH_USER: ${{ secrets.KAMAL_SSH_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Run migrations
        run: kamal app exec --reuse "/app/relaciona-brasil --mode migrate"
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_HOST: ssh.israeldeveloper.com.br
          KAMAL_SSH_USER: ${{ secrets.KAMAL_SSH_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
