# Tuning para baremetal compartilhado: 3.7 GB RAM total, 2 CPU.
# Outros containers (portfolio, kamal-proxy, registry) também consomem RAM.
# Valores conservadores — Postgres não deve passar de ~1 GB residente.

listen_addresses = '*'

shared_buffers = 512MB
effective_cache_size = 1500MB
work_mem = 32MB
maintenance_work_mem = 256MB

max_connections = 20

# WAL
wal_compression = on
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Planner
random_page_cost = 1.1          # SSD
effective_io_concurrency = 200

# Paralelismo modesto (só 2 cores)
max_worker_processes = 4
max_parallel_workers = 2
max_parallel_workers_per_gather = 1
max_parallel_maintenance_workers = 1

# Logs
log_min_duration_statement = 1000   # >1s loga
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p] %q%u@%d '
log_timezone = 'UTC'

# Stats
track_io_timing = on
